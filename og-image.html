<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1200px; height: 630px;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    position: relative;
  }
  .bg {
    position: absolute; inset: 0;
    background: url('photo1.png') center/cover no-repeat;
  }
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(120deg, rgba(13,15,20,0.85) 40%, rgba(108,99,255,0.5) 80%, rgba(0,212,170,0.3) 100%);
  }
  .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 60px 80px;
  }
  .badge {
    display: inline-block;
    background: rgba(108,99,255,0.3);
    border: 1px solid rgba(108,99,255,0.6);
    color: #c8c2ff;
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    width: fit-content;
    margin-bottom: 28px;
  }
  h1 {
    font-size: 58px;
    font-weight: 900;
    color: #fff;
    line-height: 1.15;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  h1 span { color: #00d4aa; }
  .sub {
    font-size: 24px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 40px;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, #6c63ff, #00d4aa);
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    padding: 18px 40px;
    border-radius: 50px;
    width: fit-content;
  }
  .name {
    position: absolute;
    bottom: 32px; right: 60px;
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="badge">🚛 Эксперт-практик · 10+ лет</div>
    <h1>Оптимизация логистики<br>и внедрение <span>нейросотрудников</span></h1>
    <div class="sub">Сокращу затраты на 30–40% · Автоматизирую рутину с ИИ</div>
    <div class="cta">Узнать подробнее →</div>
  </div>
  <div class="name">Жилина Елена</div>
</body>
</html>
